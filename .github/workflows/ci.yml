name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bunx tsc --noEmit
      - run: bunx eslint .

  test:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: zgate
          POSTGRES_USER: zgate
          POSTGRES_PASSWORD: zgate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zgate"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://zgate:zgate@localhost:5432/zgate
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - run: bun install
      - run: cargo build --release
        working-directory: rtk
      - run: bunx prisma generate
      - name: Enable pgvector extension
        run: psql postgresql://zgate:zgate@localhost:5432/zgate -c "CREATE EXTENSION IF NOT EXISTS vector;"
        env:
          PGPASSWORD: zgate
      - run: bunx prisma migrate deploy
      - run: bun test

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
