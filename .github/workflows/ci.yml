name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:
  lint-typecheck:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bunx tsc --noEmit
      - run: bunx eslint .

  test:
    runs-on: ubuntu-latest
    needs: lint-typecheck
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: zgate
          POSTGRES_USER: zgate
          POSTGRES_PASSWORD: zgate
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zgate"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_ADMIN_SECRET: ${{ secrets.JWT_ADMIN_SECRET }}
      API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
      MACHINE_ID_SALT: ${{ secrets.MACHINE_ID_SALT }}
      CREDENTIALS_ENCRYPT_KEY: ${{ secrets.CREDENTIALS_ENCRYPT_KEY }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      MEMORY_ENCRYPT_KEY: ${{ secrets.MEMORY_ENCRYPT_KEY }}
      PGPASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: dtolnay/rust-toolchain@stable
      - run: bun install
      - run: cargo build --release
        working-directory: rtk
      - run: bunx prisma generate
      - name: Enable pgvector extension
        run: psql ${{ secrets.DATABASE_URL }} -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - run: bunx prisma migrate deploy
      - run: bun test

  build:
    runs-on: ubuntu-latest
    needs: test
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_ADMIN_SECRET: ${{ secrets.JWT_ADMIN_SECRET }}
      API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
      MACHINE_ID_SALT: ${{ secrets.MACHINE_ID_SALT }}
      CREDENTIALS_ENCRYPT_KEY: ${{ secrets.CREDENTIALS_ENCRYPT_KEY }}
      EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      MEMORY_ENCRYPT_KEY: ${{ secrets.MEMORY_ENCRYPT_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
